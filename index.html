<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Orbital Transfer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;

            overflow: hidden;
            background: #0a0a12;
            touch-action: none;
        }
        canvas,
        svg {
            display: block;
            width: 100%;
            height: 100%;
            grid-area: bg;
        }
        body {
            display: grid;
            grid-template-areas: "bg";
        }
    </style>
</head>
<body>
    <canvas id="background"></canvas>
    <canvas id="game"></canvas>
