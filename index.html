<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Orbital Transfer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;

            overflow: hidden;
            background: #0a0a12;
            touch-action: none;
        }
        canvas,
        svg,
        #ui {
            display: block;
            width: 100%;
            height: 100%;
            grid-area: bg;
        }

        #ui {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        .top {
            display: flex;
            justify-content: flex-end;
            padding: 10px;
        }

        .fuel-gauge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: "Courier New", monospace;
            font-size: 14px;
            color: #ffaa00;
        }

        .fuel-icon {
            width: 30px;
            height: 40px;
            position: relative;
        }

        .fuel-icon svg {
            width: 100%;
            height: 100%;
        }

        .fuel-level {
            fill: #ffaa00;
            transition: height 0.1s ease-out;
        }

        .fuel-gauge.low .fuel-level {
            fill: #ff3333;
        }

        .fuel-gauge.low {
            color: #ff3333;
        }

        .bottom {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-family: "Courier New", monospace;
            font-size: 16px;

            .retro {
                color: #ff6600;
            }

            .prograde {
                color: #00ff88;
            }
        }

        body {
            display: grid;
            grid-template-areas: "bg";
        }
    </style>
</head>
<body>
    <canvas id="background"></canvas>
    <canvas id="game"></canvas>
    <!--

                <ellipse cx="70" cy="100" rx="60" ry="80" stroke="#00e5ff80" stroke-linecap="round" stroke-dasharray="4,4" fill="none" stroke-width="1" />
                <circle cx="70" cy="150" r="11" fill="#00e5ff" filter="url(#glow)" />
                <circle cx="70" cy="50" r="10" fill="#ff6b35" filter="url(#glow)" />
            </g>
            
        </svg>
        -->
    <div id="ui">
        <div class="top">
            <div class="fuel-gauge" id="fuelGauge">
                <div class="fuel-icon">
                    <svg viewBox="0 0 30 40">
                        <path d="M15 2 L25 8 L25 32 Q25 38 15 38 Q5 38 5 32 L5 8 Z" fill="none" stroke="#ffaa00" stroke-width="2"/>
                        <rect class="fuel-level" x="7" y="10" width="16" height="26" rx="1"/>
                        <rect x="10" y="0" width="10" height="4" fill="#ffaa00" rx="1"/>
                    </svg>
                </div>
                <span id="fuelText">1000</span>
            </div>
        </div>
        <div class="bottom">
            <span class="retro">◄ RETRO</span>
            <span class="prograde">PROGRADE ►</span>
        </div>
    </div>
<script src="main.js" type="module"></script>
